<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفروشاتي — لوحة التحكم</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1f2937;--bg4:#252d3a;
  --gold:#c9a96e;--gold2:#e8c57a;--gold-dim:rgba(201,169,110,.12);
  --tx:#e6edf3;--mt:#8b949e;--bd:#30363d;
  --green:#2ea043;--red:#f85149;--blue:#58a6ff;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--tx);direction:rtl;overflow:hidden;height:100vh;display:flex;font-size:13px}

.sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;height:100vh}
.sidebar-brand{padding:18px 14px 14px;border-bottom:1px solid var(--bd)}
.sidebar-logo{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0d1117}
.sidebar-logo-name{font-size:16px;font-weight:900;color:var(--gold)}
.sidebar-sub{font-size:10px;color:var(--mt);margin-right:42px}
.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.8px;padding:8px 8px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--mt);font-size:13px;font-weight:600;transition:all .18s;margin-bottom:2px;border:none;background:none;width:100%;font-family:Tajawal,sans-serif;text-align:right}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.on{background:var(--gold-dim);color:var(--gold);font-weight:800}
.nav-icon{font-size:15px;flex-shrink:0}
.nav-badge{background:var(--gold);color:#0d1117;border-radius:50px;padding:1px 7px;font-size:10px;font-weight:900;margin-right:auto}
.nav-badge-red{background:var(--red);color:#fff;border-radius:50px;padding:1px 7px;font-size:10px;font-weight:900;margin-right:auto}
.sidebar-footer{padding:12px;border-top:1px solid var(--bd)}
.admin-user{display:flex;align-items:center;gap:8px}
.admin-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold)}
.admin-name{font-size:12px;font-weight:700;color:var(--tx)}
.admin-role{font-size:10px;color:var(--mt)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ADMIN SEARCH */
.admin-search-wrap{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:none}
.admin-search-wrap.visible{display:block}
.admin-search-inner{position:relative}
.admin-search-input{width:100%;box-sizing:border-box;padding:9px 14px 9px 36px;border:1.5px solid var(--bd);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;background:var(--bg3);color:var(--tx);outline:none;transition:border .2s}
.admin-search-input:focus{border-color:var(--gold)}
.admin-search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.4}

.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--tx)}
.topbar-sub{font-size:11px;color:var(--mt);margin-top:1px}
.topbar-acts{margin-right:auto;display:flex;gap:8px}
.btn-primary{padding:7px 16px;border-radius:7px;background:var(--gold);color:#0d1117;font-size:12px;font-weight:800;border:none;cursor:pointer;font-family:Tajawal,sans-serif;display:flex;align-items:center;gap:5px;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.btn-ghost{padding:7px 14px;border-radius:7px;background:none;color:var(--mt);font-size:12px;font-weight:700;border:1.5px solid var(--bd);cursor:pointer;font-family:Tajawal,sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.content{flex:1;overflow-y:auto;padding:18px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .2s}
.stat-card:hover{border-color:rgba(201,169,110,.4)}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-label{font-size:11px;color:var(--mt);margin-bottom:5px;font-weight:600}
.stat-val{font-size:24px;font-weight:900;color:var(--tx);margin-bottom:3px}
.stat-change{font-size:11px;color:var(--green)}

.section{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;margin-bottom:14px;overflow:hidden}
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--bd)}
.section-title{font-size:13px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:7px}
.section-count{font-size:11px;color:var(--mt);background:var(--bg3);padding:2px 8px;border-radius:20px}

.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;text-align:right;font-size:11px;font-weight:700;color:var(--mt);border-bottom:1px solid var(--bd);background:var(--bg3);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid rgba(48,54,61,.5);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.018)}
.tbl-name{font-weight:700;color:var(--tx)}
.tbl-sub{font-size:11px;color:var(--mt);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge-active{background:rgba(46,160,67,.15);color:var(--green);border:1px solid rgba(46,160,67,.3)}
.badge-pending{background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.badge-suspended{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.color-dots{display:flex;gap:3px;flex-wrap:wrap}
.color-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15)}
.actions{display:flex;gap:5px}
.act-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:Tajawal,sans-serif;transition:all .18s}
.act-edit{background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.2)}
.act-edit:hover{background:rgba(88,166,255,.2)}
.act-del{background:rgba(248,81,73,.08);color:var(--red);border:1px solid rgba(248,81,73,.18)}
.act-del:hover{background:rgba(248,81,73,.18)}
.tbl-emoji{width:36px;height:36px;border-radius:7px;background:var(--bg3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.commission-tag{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.3);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;width:min(480px,96vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);animation:popIn .22s ease}
@keyframes popIn{from{transform:scale(.93);opacity:.4}to{transform:scale(1);opacity:1}}
.modal-hd{padding:15px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:14px;font-weight:800}
.modal-close{background:var(--bg3);border:1px solid var(--bd);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--mt);font-size:13px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px}
.form-row{margin-bottom:13px}
.form-label{font-size:11px;font-weight:700;color:var(--mt);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg3);color:var(--tx);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-select{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg3);color:var(--tx);outline:none;cursor:pointer}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{padding:13px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.btn-danger{padding:7px 14px;border-radius:7px;background:rgba(248,81,73,.12);color:var(--red);font-size:12px;font-weight:800;border:1px solid rgba(248,81,73,.25);cursor:pointer;font-family:Tajawal,sans-serif}

.colors-editor{border:1.5px solid var(--bd);border-radius:8px;padding:10px;background:var(--bg3)}
.color-block{border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;background:var(--bg2)}
.color-block-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.color-preview{width:30px;height:30px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--bd);cursor:pointer}
.cin{flex:1;padding:7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;font-family:Tajawal,sans-serif;background:var(--bg3);color:var(--tx);outline:none}
.cin:focus{border-color:var(--gold)}
.cin-sm{width:72px;padding:7px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;font-family:Tajawal,sans-serif;background:var(--bg3);color:var(--tx);outline:none;direction:ltr}
.cin-sm:focus{border-color:var(--gold)}
.color-remove{background:none;border:none;color:var(--mt);cursor:pointer;font-size:16px;padding:3px;transition:color .18s;margin-right:auto}
.color-remove:hover{color:var(--red)}
.color-imgs-label{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.color-imgs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.color-img-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1.5px solid var(--bd);background:var(--bg3);cursor:pointer}
.color-img-thumb img{width:100%;height:100%;object-fit:cover}

/* AUTH OVERLAY */
#authOverlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}

/* LIGHTBOX */
.lb-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;align-items:center;justify-content:center}
.lb-bg.open{display:flex}
.lb-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
.lb-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;width:46px;height:46px;border-radius:50%;cursor:pointer}
.lb-arrow:hover{background:rgba(255,255,255,.3)}
.lb-prev{right:18px}.lb-next{left:18px}
.lb-counter{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:12px}
.color-img-del{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.color-img-add{aspect-ratio:1;border-radius:6px;border:1.5px dashed var(--bd);background:none;color:var(--mt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.color-img-add:hover{border-color:var(--gold);color:var(--gold)}
.add-color-btn{width:100%;padding:7px;border-radius:6px;background:none;border:1.5px dashed var(--bd);color:var(--mt);font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;transition:all .2s;margin-top:4px}
.add-color-btn:hover{border-color:var(--gold);color:var(--gold)}

.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:200px;overflow-y:auto}
.prod-check{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:7px;border:1.5px solid var(--bd);cursor:pointer;transition:all .18s}
.prod-check:hover{border-color:rgba(201,169,110,.4)}
.prod-check.sel{border-color:var(--gold);background:var(--gold-dim)}
.prod-check-lbl{font-size:11px;font-weight:600;line-height:1.3;flex:1}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:9px 22px;border-radius:50px;font-size:12px;font-weight:700;z-index:9999;display:none;box-shadow:var(--shadow);font-family:Tajawal,sans-serif;white-space:nowrap}
.empty{text-align:center;padding:36px;color:var(--mt);font-size:13px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
<base target="_blank">
</head>
<body>
<div class="toast" id="toast"></div>

<!-- AUTH OVERLAY -->
<div id="authOverlay">
  <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:36px 32px;width:min(360px,92vw);text-align:center">
    <div style="width:52px;height:52px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#0d1117;margin:0 auto 16px">م</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">مفروشاتي</div>
    <div style="font-size:12px;color:var(--mt);margin-bottom:24px">لوحة التحكم — Super Admin</div>
    <input id="authEmail" type="email" placeholder="البريد الإلكتروني" style="width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:14px;font-family:Tajawal,sans-serif;direction:ltr;text-align:center;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')document.getElementById('authPass').focus()">
    <input id="authPass" type="password" placeholder="كلمة المرور" style="width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:14px;font-family:Tajawal,sans-serif;direction:ltr;text-align:center;outline:none;margin-bottom:10px" onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="authErr" style="color:var(--red);font-size:11px;margin-bottom:10px;min-height:16px"></div>
    <button onclick="checkAuth()" id="authBtn" style="width:100%;padding:11px;border-radius:8px;background:var(--gold);color:#0d1117;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:Tajawal,sans-serif">دخول</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb-bg" id="lbBg">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-arrow lb-prev" id="lbPrev" onclick="lbMove(1)">›</button>
  <img class="lb-img" id="lbImg" src="" alt="">
  <button class="lb-arrow lb-next" id="lbNext" onclick="lbMove(-1)">‹</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">م</div>
      <div class="sidebar-logo-name">مفروشاتي</div>
    </div>
    <div class="sidebar-sub">لوحة التحكم — Super Admin</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-label">القائمة الرئيسية</div>
    <button class="nav-item on" id="nav-overview" onclick="goTab('overview',this)"><span class="nav-icon">📊</span> نظرة عامة</button>
    <button class="nav-item" id="nav-brands" onclick="goTab('brands',this)"><span class="nav-icon">🏢</span> الشركات <span class="nav-badge" id="nb-brands">0</span></button>
    <button class="nav-item" id="nav-materials" onclick="goTab('materials',this)"><span class="nav-icon">🧵</span> الخامات</button>
    <button class="nav-item" id="nav-products" onclick="goTab('products',this)"><span class="nav-icon">🛋️</span> المنتجات <span class="nav-badge" id="nb-products">0</span></button>
    <button class="nav-item" id="nav-marketers" onclick="goTab('marketers',this)"><span class="nav-icon">👤</span> المسوقون <span class="nav-badge" id="nb-marketers">0</span></button>
    <div class="nav-label" style="margin-top:6px">المتابعة</div>
    <button class="nav-item" id="nav-orders" onclick="goTab('orders',this)"><span class="nav-icon">📦</span> الطلبات <span class="nav-badge-red" id="nb-orders">0</span></button>
    <button class="nav-item" id="nav-registrations" onclick="goTab('registrations',this)"><span class="nav-icon">📋</span> التسجيلات <span class="nav-badge-red" id="nb-registrations" style="display:none">0</span></button>
    <button class="nav-item" id="nav-subscribers" onclick="goTab('subscribers',this)"><span class="nav-icon">👥</span> المشتركون <span class="nav-badge" id="nb-subscribers">0</span></button>
    <button class="nav-item" id="nav-leaderboard" onclick="goTab('leaderboard',this)"><span class="nav-icon">🏆</span> Leaderboard</button>
  </div>
  <div class="sidebar-footer">
    <div class="admin-user">
      <div class="admin-avatar">S</div>
      <div style="flex:1">
        <div class="admin-name" id="admin-email">Super Admin</div>
        <div class="admin-role">مفروشاتي · الكويت</div>
      </div>
      <button onclick="doAdminLogout()" title="خروج" style="background:none;border:none;cursor:pointer;color:var(--mt);font-size:16px;padding:4px">🚪</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">نظرة عامة</div>
      <div class="topbar-sub" id="topbar-sub">مرحباً، كل شيء تمام 👋</div>
    </div>
    <div class="topbar-acts" id="topbar-acts"></div>
  </div>
  <div class="admin-search-wrap" id="adminSearchWrap">
    <div class="admin-search-inner">
      <span class="admin-search-icon">🔍</span>
      <input class="admin-search-input" id="adminSearch" type="text" placeholder="ابحث..." oninput="render()">
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz2PtMjNm4HlBCjS4GzuBdrVNdnMXhRNQ",
  authDomain: "mafroshaty.firebaseapp.com",
  databaseURL: "https://mafroshaty-default-rtdb.firebaseio.com",
  projectId: "mafroshaty",
  storageBucket: "mafroshaty.firebasestorage.app",
  messagingSenderId: "933051451932",
  appId: "1:933051451932:web:f694fa37b7548e0b746dd9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ===== STATE =====
let brands={}, products={}, marketers={}, orders={}, materials={}, allSubscribersData={};
let editColors=[], editProd={}, currentTab='overview', _selectedTheme='luxury';

// ===== HELPERS =====
function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function gb(id){return brands[id]||{ar:'—',en:'—'}}
function getBrandByProduct(nameAr){
  const p=Object.values(products||{}).find(p=>p.nameAr===nameAr||p.nameEn===nameAr);
  if(!p)return'';
  const b=brands[p.brand_id||p.brand];
  return b?b.ar||b.en||'':'';
}
function resolveItemBrand(item){
  if(item.brandAr||item.brandEn)return item.brandAr||item.brandEn;
  return getBrandByProduct(item.product||item.nameAr||'');
}
function brandsArr(){return Object.entries(brands).map(([k,v])=>({...v,id:k}))}
function materialsArr(){return Object.entries(materials).map(([k,v])=>({...v,id:k}))}
function productsArr(){return Object.entries(products).map(([k,v])=>({...v,id:k}))}
function marketersArr(){return Object.entries(marketers).map(([k,v])=>({...v,id:k}))}
function ordersArr(){return Object.entries(orders||{}).map(([k,v])=>({...v,id:k}))}

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=ok===false?'var(--red)':'var(--tx)';
  t.style.display='block';clearTimeout(t._x);t._x=setTimeout(()=>t.style.display='none',2400);
}
function updateBadges(){
  document.getElementById('nb-brands').textContent=brandsArr().length;
  document.getElementById('nb-products').textContent=productsArr().length;
  document.getElementById('nb-marketers').textContent=marketersArr().length;
  document.getElementById('nb-orders').textContent=ordersArr().filter(o=>o.status==='new').length;
}

// ===== REALTIME LISTENERS =====
function initListeners(){
  db.ref('materials').on('value',snap=>{
    materials=snap.val()||{};
    if(currentTab==='materials')render();
  });
  db.ref('brands').on('value',snap=>{
    brands=snap.val()||{};updateBadges();
    if(currentTab==='brands'||currentTab==='overview')render();
  });
  db.ref('products').on('value',snap=>{
    products=snap.val()||{};updateBadges();
    if(currentTab==='products'||currentTab==='overview')render();
  });
  db.ref('marketers').on('value',snap=>{
    marketers=snap.val()||{};updateBadges();
    if(currentTab==='marketers')render();
  });
  let prevOrderKeys=new Set();
  db.ref('orders').on('value',snap=>{
    const data=snap.val()||{};
    Object.entries(data).forEach(([k,v])=>{
      if(!prevOrderKeys.has(k) && prevOrderKeys.size>0 && v.status==='new'){
        toast('🔔 طلب جديد وصل!');
        notifyMarketerWA(v);
      }
      prevOrderKeys.add(k);
    });
    orders=data;updateBadges();
    if(currentTab==='orders'||currentTab==='overview')render();
  });
}

// ===== REGISTRATIONS DATA =====
let registrationsData = {};
function initRegistrationsListener(){
  db.ref('registrations').on('value', snap => {
    registrationsData = snap.val() || {};
    const pending = Object.values(registrationsData).filter(r => r.status === 'pending').length;
    const badge = document.getElementById('nb-registrations');
    if(badge){
      badge.textContent = pending;
      badge.style.display = pending > 0 ? '' : 'none';
    }
    if(currentTab === 'registrations') render();
  });
}

// ===== SUBSCRIBERS LISTENER =====
function initSubscribersListener(){
  // نسمع على كل المسوقين ونجمع مشتركيهم
  db.ref('marketers').on('value', snap => {
    const mktData = snap.val()||{};
    allSubscribersData = {};
    Object.entries(mktData).forEach(([mktId, mkt]) => {
      const subs = mkt.subscribers||{};
      Object.entries(subs).forEach(([wa, sub]) => {
        allSubscribersData[wa] = {
          ...sub,
          wa,
          marketer_id: mktId,
          marketer_name: mkt.name||mkt.slug||mktId,
          marketer_slug: mkt.slug||''
        };
      });
    });
    const total = Object.keys(allSubscribersData).length;
    const badge = document.getElementById('nb-subscribers');
    if(badge) badge.textContent = total;
    if(currentTab==='subscribers') render();
  });
}
auth.onAuthStateChanged(user => {
  const overlay = document.getElementById('authOverlay');
  if (user) {
    // مسجّل دخول — أخفي الـ overlay وابدأ التطبيق
    overlay.style.display = 'none';
    const emailEl = document.getElementById('admin-email');
    if (emailEl) emailEl.textContent = user.email || 'Admin';
    document.getElementById('content').innerHTML = '<div class="empty" style="padding:60px;font-size:14px">⏳ جاري الاتصال بـ Firebase...</div>';
    initListeners();
    initRegistrationsListener();
    initSubscribersListener();
    goTab('overview', document.getElementById('nav-overview'));
  } else {
    // مش مسجّل — أظهر شاشة الدخول
    overlay.style.display = 'flex';
    setTimeout(() => {
      const el = document.getElementById('authEmail');
      if (el) el.focus();
    }, 100);
  }
});

window.checkAuth = function() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const btn   = document.getElementById('authBtn');
  const err   = document.getElementById('authErr');
  if (!email || !pass) { err.textContent = 'أدخل البريد وكلمة المرور'; return; }
  btn.textContent = '⏳ جاري الدخول...';
  btn.disabled = true;
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => { err.textContent = ''; })
    .catch(() => {
      err.textContent = 'بيانات غير صحيحة — حاول مرة أخرى';
      btn.textContent = 'دخول';
      btn.disabled = false;
      document.getElementById('authPass').value = '';
    });
};

window.doAdminLogout = function() {
  auth.signOut().then(() => {
    location.reload();
  });
};

function goTab(id,el){
  currentTab=id;
  if(id!=='products') _prodBrandFilter='all'; // reset الفلتر لما تغير التاب
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  if(el)el.classList.add('on');
  const t=TABS[id];
  document.getElementById('topbar-title').textContent=t.title;
  document.getElementById('topbar-sub').textContent=t.sub;
  document.getElementById('topbar-acts').innerHTML=t.btn;
  const searchableTabs=['brands','products','marketers','orders','materials','subscribers'];
  const sw=document.getElementById('adminSearchWrap');

function render(){

  if(currentTab==='overview')c.innerHTML=renderOverview();
  else if(currentTab==='brands')c.innerHTML=renderBrands();
  else if(currentTab==='materials')c.innerHTML=renderMaterials();
  else if(currentTab==='products')c.innerHTML=renderProducts();
  else if(currentTab==='marketers')c.innerHTML=renderMarketers();
  else if(currentTab==='orders')c.innerHTML=renderOrders();
  else if(currentTab==='registrations')c.innerHTML=renderRegistrations();
  else if(currentTab==='subscribers')c.innerHTML=renderSubscribers();

}

function approveReg(id, name, phone, ref){
  if(!confirm('قبول طلب ' + name + '؟')) return;
  db.ref('registrations/'+id).update({status:'approved'});
}
function contactReg(phone, name){
  const msg = encodeURIComponent('مرحباً ' + name + ' 👋\nتم قبول طلبك في منصة ديباجات!\nسنتواصل معك قريباً لتفعيل متجرك.');
  window.open('https://wa.me/' + phone + '?text=' + msg, '_blank');
}
function rejectReg(id){
  if(!confirm('رفض هذا الطلب؟')) return;
  db.ref('registrations/'+id).update({status:'rejected'});
}

function statusBadge(s){
  if(s==='new')return'<span class="badge badge-pending">جديد</span>';
  if(s==='confirmed')return'<span class="badge badge-active">مؤكد</span>';
  if(s==='delivered')return'<span class="badge badge-active">مسلّم</span>';
  return'<span class="badge badge-suspended">ملغي</span>';
}

function toggleBrandMarketer(brandId, marketerId, toggleEl){
  const isOn = toggleEl.dataset.on==='1';
  const newOn = !isOn;
  // جيب brands المسوق الحالية
  const m = marketers[marketerId];
  if(!m) return;
  // لو brands مش موجودة = كل الشركات متاحة، نبني القائمة من الموجودين
  let brandsList = m.brands ? [...m.brands] : Object.keys(brands);
  if(newOn){
    if(!brandsList.includes(brandId)) brandsList.push(brandId);
  } else {
    brandsList = brandsList.filter(b=>b!==brandId);
  }
  db.ref('marketers/'+marketerId+'/brands').set(brandsList).then(()=>{
    toggleEl.dataset.on = newOn?'1':'0';
    toggleEl.style.background = newOn?'var(--green)':'var(--bd)';
    toggleEl.querySelector('div').style.left = newOn?'17px':'3px';
    const txt = document.getElementById('bmtxt-'+marketerId);
    if(txt){ txt.textContent=newOn?'يعرض':'مخفي'; txt.style.color=newOn?'var(--green)':'var(--mt)'; }
    toast(newOn?'تم التفعيل ✓':'تم الإيقاف ✓');
  }).catch(e=>toast('خطأ: '+e.message,false));
}

function setBrandMarketers(brandId, enable){
  const ma = marketersArr();
  if(!ma.length) return;
  const updates={};
  ma.forEach(m=>{
    let brandsList = m.brands ? [...m.brands] : Object.keys(brands);
    if(enable){
      if(!brandsList.includes(brandId)) brandsList.push(brandId);
    } else {
      brandsList = brandsList.filter(b=>b!==brandId);
    }
    updates['marketers/'+m.id+'/brands']=brandsList;
  });
  db.ref().update(updates).then(()=>{
    toast(enable?'تم تفعيل الكل ✓':'تم إيقاف الكل ✓');
    // تحديث الـ toggles في الـ UI
    ma.forEach(m=>{
      const el=document.querySelector(`[data-on][onclick*="'${m.id}'"]`);
      if(el){
        el.dataset.on=enable?'1':'0';
        el.style.background=enable?'var(--green)':'var(--bd)';
        el.querySelector('div').style.left=enable?'17px':'3px';
        const txt=document.getElementById('bmtxt-'+m.id);
        if(txt){txt.textContent=enable?'يعرض':'مخفي';txt.style.color=enable?'var(--green)':'var(--mt)';}
      }
    });
  }).catch(e=>toast('خطأ: '+e.message,false));
}

  const cb=document.getElementById('mat-'+id),lbl=document.getElementById('mat-lbl-'+id);
  cb.checked=!cb.checked;
  lbl.style.borderColor=cb.checked?'var(--gold)':'var(--bd)';
  lbl.style.background=cb.checked?'var(--gold-dim)':'var(--bg2)';
}
function toggleSizeLbl(id){
  const cb=document.getElementById('size-'+id),lbl=document.getElementById('size-lbl-'+id);
  cb.checked=!cb.checked;
  lbl.style.borderColor=cb.checked?'var(--gold)':'var(--bd)';
  lbl.style.background=cb.checked?'var(--gold-dim)':'var(--bg2)';

function renderColors(){

  const checkedSizes=ALL_SIZES.filter(s=>document.getElementById('size-'+s.id)?.checked);
  el.innerHTML=editColors.map((c,i)=>{
    const szSO=c.sizeSoldOut||{};
    const sizeBtns=checkedSizes.length?`
      <div style="margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:7px;border:1px solid var(--bd)">
        <div style="font-size:10px;font-weight:700;color:var(--mt);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">نفاذ المقاسات لهذا اللون:</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${checkedSizes.map(s=>`
            <button type="button" onclick="toggleColorSizeSO(${i},'${s.id}')" style="padding:4px 10px;border-radius:6px;border:1.5px solid ${szSO[s.id]?'var(--red)':'var(--bd)'};background:${szSO[s.id]?'rgba(248,81,73,.12)':'var(--bg3)'};color:${szSO[s.id]?'var(--red)':'var(--mt)'};font-size:11px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;transition:all .18s;display:flex;align-items:center;gap:4px">
              ${szSO[s.id]?'✓':''} ${xe(s.ar)} ${szSO[s.id]?'— نفذت':''}
            </button>`).join('')}
        </div>
      </div>`:''
    return`<div class="color-block">
      <div class="color-block-hd">
        <div class="color-preview" style="background:${c.hex};position:relative" onclick="document.getElementById('cp${i}').click()">
        </div>
        <input type="color" id="cp${i}" value="${c.hex}" style="display:none" oninput="editColors[${i}].hex=this.value;document.querySelectorAll('.color-preview')[${i}].style.background=this.value">
        <input class="cin" value="${xe(c.ar||'')}" placeholder="اسم اللون بالعربي" oninput="editColors[${i}].ar=this.value">
        <input class="cin-sm" value="${xe(c.en||'')}" placeholder="EN" oninput="editColors[${i}].en=this.value">
        <button class="color-remove" onclick="editColors.splice(${i},1);renderColors()">🗑️</button>
      </div>
      <div class="color-imgs-label">صور هذا اللون (حتى 8 صور)</div>
      <div class="color-imgs-grid" id="imgs-grid-${i}">
        ${(c.imgs||[]).map((url,j)=>`<div class="color-img-thumb" onclick="openLightbox(editColors[${i}].imgs,${j})"><img src="${xe(url)}" alt="" onerror="this.src=''"><button class="color-img-del" onclick="event.stopPropagation();removeColorImg(${i},${j})">✕</button></div>`).join('')}
        ${(c.imgs||[]).length<8?`<button class="color-img-add" onclick="addColorImg(${i})">+</button>`:''}
      </div>
      <input type="url" class="cin" id="img-url-${i}" placeholder="أو الصق رابط صورة (https://...)" style="direction:ltr;margin-top:4px;font-size:11px" onkeydown="if(event.key==='Enter'){pasteImgUrl(${i});event.preventDefault()}">
      <button style="margin-top:5px;padding:4px 10px;border-radius:6px;background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.3);font-size:11px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif" onclick="pasteImgUrl(${i})">+ إضافة الرابط</button>
      ${sizeBtns}
    </div>`;
  }).join('');
}
function toggleColorSizeSO(ci,sid){
  if(!editColors[ci].sizeSoldOut) editColors[ci].sizeSoldOut={};
  editColors[ci].sizeSoldOut[sid]=!editColors[ci].sizeSoldOut[sid];
  renderColors();
}
function addColor(){editColors.push({ar:'لون جديد',en:'New Color',hex:'#c8a97a',imgs:[]});renderColors();}
function addColorImg(ci){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=e=>{
    const files=[...e.target.files];const c=editColors[ci];if(!c.imgs)c.imgs=[];
    files.slice(0,8-c.imgs.length).forEach(f=>{
      const r=new FileReader();r.onload=ev=>{c.imgs.push(ev.target.result);renderColors();};r.readAsDataURL(f);
    });
  };inp.click();
}
function pasteImgUrl(ci){
  const inp=document.getElementById('img-url-'+ci),url=inp.value.trim();
  if(!url){toast('أدخل رابط الصورة',false);return;}
  if(!editColors[ci].imgs) editColors[ci].imgs=[];
  if(editColors[ci].imgs.length>=8){toast('الحد الأقصى 8 صور',false);return;}
  editColors[ci]={...editColors[ci], imgs:[...editColors[ci].imgs, url]};
  inp.value='';renderColors();
}
function removeColorImg(ci,ji){editColors[ci].imgs.splice(ji,1);renderColors();}
function togglePriceFields(){
  const isRequest = document.getElementById('p-price-request').checked;
  const priceInput = document.getElementById('p-price');
  const oldInput = document.getElementById('p-old');
  if(priceInput) priceInput.disabled = isRequest;
  if(oldInput) oldInput.disabled = isRequest;
  if(priceInput) priceInput.style.opacity = isRequest ? '0.5' : '1';
  if(oldInput) oldInput.style.opacity = isRequest ? '0.5' : '1';
}

function saveProduct(id){
  const ar=document.getElementById('p-ar').value.trim();
  const en=document.getElementById('p-en').value.trim();
  const price=Number(document.getElementById('p-price').value);
  if(!ar||!en||!price){toast('أدخل الاسم والسعر',false);return;}
  const slug=document.getElementById('p-slug').value.trim();
  if(!slug){toast('أدخل رابط المشاركة (Slug)',false);return;}
  // تحقق إن الـ slug مش متكرر
  const existingSlug=Object.entries(products).find(([k,v])=>v.slug===slug && k!==(id||''));
  if(existingSlug){toast('هذا الـ Slug مستخدم مسبقاً — اختر اسماً آخر',false);return;}
  const sizes=ALL_SIZES.map(s=>s.id).filter(sid=>document.getElementById('size-'+sid)?.checked);
  const mats=materialsArr().map(m=>m.id).filter(mid=>document.getElementById('mat-'+mid)?.checked);
  const sizePrices={};
  ALL_SIZES.forEach(s=>{
    const v=Number(document.getElementById('size-price-'+s.id)?.value);
    if(v) sizePrices[s.id]=v;
  });
  const colorsObj={};
  editColors.forEach((c,i)=>{
    const key=c._key||('c'+(i+1));
    let imgs=c.imgs||[];
    if(!Array.isArray(imgs)) imgs=Object.values(imgs);
    colorsObj[key]={ar:c.ar||'',en:c.en||'',hex:c.hex,imgs,soldOut:c.soldOut||false,sizeSoldOut:c.sizeSoldOut||{}};
  });
  const oldPrice=Number(document.getElementById('p-old').value);
  const priceOnRequest=document.getElementById('p-price-request').checked;
  const obj={
    brand_id:document.getElementById('p-brand').value,
    nameAr:ar,nameEn:en,
    slug,
    ogImage:document.getElementById('p-og-url').value.trim()||null,
    descAr:document.getElementById('p-desc-ar').value.trim(),
    descEn:document.getElementById('p-desc-en').value.trim(),
    price:priceOnRequest?0:price,oldPrice:priceOnRequest?null:(oldPrice||null),priceOnRequest,currency:'KWD',
    commission:Number(document.getElementById('p-comm')?.value)||0,
    badge:document.getElementById('p-badge').value,
    emoji:document.getElementById('p-emoji').value||'🛋️',
    status:document.getElementById('p-status').value,
    sizes,sizePrices,materials:mats,colors:colorsObj
  };
  // createdAt للمنتجات الجديدة فقط
  if(!id) obj.createdAt=new Date().toISOString();
  const p=id?db.ref('products/'+id).update(obj):db.ref('products').push(obj);
  p.then(()=>{closeModal();toast(id?'تم التعديل ✓':'تمت الإضافة ✓');}).catch(e=>toast('خطأ: '+e.message,false));
}
function delProduct(id){
  if(!confirm('حذف المنتج نهائياً؟'))return;
  db.ref('products/'+id).remove().then(()=>toast('تم الحذف')).catch(e=>toast('خطأ: '+e.message,false));
}

function renderMarketerProds(pa, oldProducts, excluded){
  const wrap = document.getElementById('prod-pick-wrap');
  if(!wrap) return;
  const byBrand = {};
  pa.forEach(p=>{
    const bid = p.brand_id||p.brand||'other';
    if(!byBrand[bid]) byBrand[bid]=[];
    byBrand[bid].push(p);
  });
  let html = '';
  Object.entries(byBrand).forEach(([bid, prods])=>{
    const brand = gb(bid);
    html += `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:8px 8px 0 0;border:1px solid var(--bd);border-bottom:none">

          <button type="button" style="padding:2px 8px;border-radius:5px;background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.3);font-size:10px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif" onclick="toggleBrandProds('${bid}',true)">كل الشركة</button>
          <button type="button" style="padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--mt);border:1px solid var(--bd);font-size:10px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif" onclick="toggleBrandProds('${bid}',false)">إخفاء الكل</button>
        </div>
      </div>
      <div class="prod-grid" style="border:1px solid var(--bd);border-radius:0 0 8px 8px;padding:8px;gap:6px;background:var(--bg3)">
        ${prods.map(p=>`<div class="prod-check${excluded.includes(p.id)?'':' sel'}" onclick="this.classList.toggle('sel')" data-pid="${p.id}" data-bid="${bid}">
          <span style="font-size:16px">${p.emoji||'🛋️'}</span>

  wrap.innerHTML = html;

function toggleBrandProds(bid, show){
  document.querySelectorAll(`#prod-pick-wrap .prod-check[data-bid="${bid}"]`).forEach(el=>{

}

            <span style="padding:9px 10px;background:var(--bg);border:1.5px solid var(--bd);border-left:none;color:var(--mt);font-size:11px;border-radius:8px 0 0 8px;white-space:nowrap;direction:ltr">@</span>
            <input class="form-input" id="m-snapchat" value="${xe(m.snapchat||'')}" placeholder="username" style="direction:ltr;border-radius:0 8px 8px 0;border-right:none">
          </div>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">🌐 اللغة الافتراضية للمتجر</label>
        <select class="form-select" id="m-default-lang">
          <option value="ar"${(m.defaultLang||'ar')==='ar'?' selected':''}>🇸🇦 العربية</option>
          <option value="en"${m.defaultLang==='en'?' selected':''}>🇬🇧 English</option>
        </select>
      </div>
      <div style="font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)">🛋️ المنتجات المتاحة</div>
      <div style="font-size:12px;color:var(--mt);margin-bottom:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--bd);line-height:1.6">
        💡 <strong style="color:var(--gold)">الافتراضي:</strong> كل المنتجات النشطة تظهر تلقائياً.
        هنا تقدر <strong>تُخفي</strong> منتجات أو شركات بعينها من متجر هذا المسوق.
      </div>
      <div id="prod-pick-wrap"></div>
    </div>
    <div class="modal-footer">
      ${!isNew?`<button class="btn-danger" onclick="delMarketer('${id}');closeModal()">حذف</button>`:''}
      <button class="btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary" onclick="saveMarketer(${isNew?'null':`'${id}'`})">${isNew?'إضافة':'حفظ'}</button>
    </div>`;
  openModal();
  setTimeout(()=>renderMarketerProds(pa, m.products||[], m.excluded||[]), 50);
}
function removeSliderImg(i){
  if(!window._sliderImgs) return;
  window._sliderImgs.splice(i,1);
  renderSliderList();
}
function addSliderImgFromUrl(){
  const inp=document.getElementById('m-slider-url-input');
  if(!inp) return;
  const url=inp.value.trim();
  if(!url) return;
  if(!window._sliderImgs) window._sliderImgs=[];
  window._sliderImgs.push(url);
  inp.value='';
  renderSliderList();
}
function addSliderImgFromFile(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(!window._sliderImgs) window._sliderImgs=[];
    window._sliderImgs.push(e.target.result);
    renderSliderList();
  };
  reader.readAsDataURL(file);
  input.value='';
}
function renderSliderList(){
  const el=document.getElementById('m-slider-list');
  if(!el) return;
  const imgs=window._sliderImgs||[];
  el.innerHTML=imgs.length===0
    ?`<div style="font-size:11px;color:var(--mt);padding:8px 0">لا توجد صور — أضف صورة بالرابط أو الرفع</div>`
    :imgs.map((url,i)=>`
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:6px 8px">
      <img src="${xe(url)}" style="width:56px;height:32px;object-fit:cover;border-radius:5px;border:1px solid var(--bd);flex-shrink:0" onerror="this.style.display='none'">
      <span style="flex:1;font-size:10px;color:var(--mt);direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${xe(url.length>50?url.slice(0,50)+'...':url)}</span>
      <button type="button" onclick="removeSliderImg(${i})" style="width:22px;height:22px;border-radius:50%;background:rgba(239,68,68,.15);border:none;color:#ef4444;font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">×</button>
    </div>`).join('');
}
function selectTheme(id){
  _selectedTheme=id;
  THEMES.forEach(t=>{
    const el=document.getElementById('theme-opt-'+t.id);
    if(!el)return;
    el.style.borderColor=t.id===id?'var(--gold)':'var(--bd)';
    el.style.background=t.id===id?'var(--gold-dim)':'var(--bg3)';
  });
  document.getElementById('custom-colors').style.display=id==='custom'?'grid':'none';
}
function saveMarketer(id){
  window._sliderImgs=window._sliderImgs||[];
  const name=document.getElementById('m-name').value.trim();
  const slug=document.getElementById('m-slug').value.trim().toLowerCase();
  if(!name||!slug){toast('أدخل الاسم والرابط',false);return;}
  const excludedProds=[...document.querySelectorAll('#prod-pick-wrap .prod-check:not(.sel)')].map(el=>el.dataset.pid).filter(Boolean);
  const theme=_selectedTheme||'luxury';
  const isNew=!id||id==='null'||id==='NEW_BRAND';
  const obj={
    name,slug,
    phone:document.getElementById('m-phone').value.trim(),
    waNumber:document.getElementById('m-wa').value.trim(),
    pin:document.getElementById('m-pin').value.trim(),
    logo:document.getElementById('m-logo-url').value.trim(),
    banner:document.getElementById('m-banner-url').value.trim(),
    sliderImages:window._sliderImgs||[],
    ogImage:document.getElementById('m-og-url').value.trim()||null,
    theme,
    colorPrimary:theme==='custom'?document.getElementById('m-c-primary').value:'',
    colorAccent:theme==='custom'?document.getElementById('m-c-accent').value:'',
    colorBg:theme==='custom'?document.getElementById('m-c-bg').value:'',
    welcomeAr:document.getElementById('m-welcome-ar').value.trim(),
    welcomeEn:document.getElementById('m-welcome-en').value.trim(),
    instagram:document.getElementById('m-instagram').value.trim(),
    facebook:document.getElementById('m-facebook').value.trim(),
    tiktok:document.getElementById('m-tiktok').value.trim(),
    snapchat:document.getElementById('m-snapchat').value.trim(),
    defaultLang:document.getElementById('m-default-lang').value,
    excluded:excludedProds,
    earnings:isNew?0:(marketers[id]?.earnings||0),
    status:document.getElementById('m-status').value,
    subExpiry:document.getElementById('m-sub-exp')?.value||null,
    subFee:Number(document.getElementById('m-sub-fee')?.value)||0,
    storeActive:document.getElementById('m-store-toggle')?.dataset.active!=='false'
  };
  const p=isNew?db.ref('marketers').push(obj):db.ref('marketers/'+id).update(obj);
  p.then(()=>{closeModal();toast(isNew?'تمت إضافة المسوق ✓':'تم التعديل ✓');}).catch(e=>toast('خطأ: '+e.message,false));
}
function delMarketer(id){
  if(!confirm('حذف المسوق نهائياً؟'))return;
  db.ref('marketers/'+id).remove().then(()=>toast('تم الحذف')).catch(e=>toast('خطأ: '+e.message,false));
}

// ===== ORDERS =====
function renderOrders(){
  const sq=(document.getElementById('adminSearch')?.value||'').trim().toLowerCase();
  const oa=ordersArr().reverse().filter(o=>!sq||(o.marketer||'').toLowerCase().includes(sq)||(o.customer||'').toLowerCase().includes(sq)||(o.phone||'').includes(sq)||(o.status||'').includes(sq));
  return`<div class="section">
    <div class="section-hd">
      <div class="section-title">📦 الطلبات <span class="section-count">${oa.length}</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="act-btn act-del" onclick="delCompletedOrders()">🗑 حذف المكتملة والملغية</button>
        <button class="act-btn act-del" onclick="delAllOrders()" style="background:rgba(248,81,73,.18)">⚠️ حذف الكل</button>
      </div>
    </div>
    ${oa.length===0?'<div class="empty">لا توجد طلبات بعد</div>':
      oa.map((o,idx)=>{
        const num=oa.length-idx;
        const items=o.items?Object.values(o.items):[{product:o.product,color:o.color,size:o.size||'',price:o.price,qty:o.qty||1,brandAr:'',brandEn:''}];
        const total=o.total||items.reduce((s,x)=>s+(x.price*(x.qty||1)),0);
        const groups={};
        items.forEach(item=>{
          const bk=resolveItemBrand(item)||'غير محدد';
          if(!groups[bk])groups[bk]=[];
          groups[bk].push(item);
        });
        return`<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="background:var(--bg3);color:var(--tx);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px">طلب #${num}</span>
              ${statusBadge(o.status)}
              <span style="font-size:11px;color:var(--mt)">${xe(o.date)}</span>
            </div>
            <span style="color:var(--gold);font-weight:800">${total} KWD</span>
          </div>
          <div style="font-size:12px;color:var(--mt);margin-bottom:10px">👤 ${xe(o.marketer||'—')}</div>
          ${Object.entries(groups).map(([brand,gitems])=>`
            <div style="border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:6px">
              <div style="background:var(--bg3);padding:5px 10px;font-size:11px;font-weight:800;color:var(--gold)">🏢 ${xe(brand)}</div>
              ${gitems.map(item=>`
                <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-top:1px solid var(--bd)">
                  <div>
                    <div style="font-size:13px;font-weight:600;color:var(--tx)">${xe(item.product||item.nameAr||'')}</div>
                    <div style="font-size:11px;color:var(--mt)">${xe(item.color||item.colorAr||'')}${item.size?' · '+xe(item.size):''} × ${item.qty||1}</div>
                  </div>
                  <span style="color:var(--gold);font-size:13px;font-weight:700">${item.price*(item.qty||1)} KWD</span>
                </div>`).join('')}
            </div>`).join('')}
          <div class="actions" style="margin-top:8px">
            ${o.status==='new'?`<button class="act-btn act-edit" style="background:rgba(46,160,67,.1);color:var(--green);border:1px solid rgba(46,160,67,.2)" onclick="updateOrderStatus('${o.id}','confirmed')">✓ تأكيد</button>`:''}
            ${o.status==='confirmed'?`<button class="act-btn act-edit" style="background:rgba(37,99,235,.1);color:#3b82f6;border:1px solid rgba(37,99,235,.2)" onclick="updateOrderStatus('${o.id}','delivered')">📦 مسلّم</button>`:''}
            ${o.status!=='cancelled'&&o.status!=='delivered'?`<button class="act-btn act-del" onclick="updateOrderStatus('${o.id}','cancelled')">✕ إلغاء</button>`:''}
            ${o.status==='delivered'||o.status==='cancelled'?`<span style="font-size:11px;color:var(--mt)">${o.status==='delivered'?'✓ مكتمل':'✕ ملغي'}</span>`:''}
            <button class="act-btn act-del" onclick="delOrder('${o.id}')" style="margin-right:auto">🗑 حذف</button>
          </div>
        </div>`;
      }).join('')}
  </div>`;
}
function delOrder(id){
  if(!confirm('حذف هذا الطلب نهائياً؟'))return;
  db.ref('orders/'+id).remove().then(()=>toast('تم حذف الطلب')).catch(e=>toast('خطأ: '+e.message,false));
}
function delCompletedOrders(){
  if(!confirm('حذف جميع الطلبات المكتملة والملغية؟'))return;
  const all=ordersArr();
  const toDelete=all.filter(o=>o.status==='delivered'||o.status==='cancelled');
  if(!toDelete.length){toast('لا توجد طلبات لحذفها',false);return;}
  const updates={};
  toDelete.forEach(o=>updates['orders/'+o.id]=null);
  db.ref().update(updates).then(()=>toast(`تم حذف ${toDelete.length} طلب ✓`)).catch(e=>toast('خطأ: '+e.message,false));
}
function delAllOrders(){
  if(!confirm('⚠️ حذف جميع الطلبات نهائياً؟ لا يمكن التراجع!'))return;
  db.ref('orders').remove().then(()=>toast('تم حذف جميع الطلبات')).catch(e=>toast('خطأ: '+e.message,false));
}
function updateOrderStatus(id,status){
  db.ref('orders/'+id).update({status})
    .then(()=>toast('تم تحديث الطلب ✓'))
    .catch(e=>toast('خطأ: '+e.message,false));
}
function notifyMarketerWA(order){
  const mkt=marketersArr().find(m=>m.name===order.marketer);
  if(!mkt||!mkt.waNumber) return;
  const msg=`🛋️ *طلب جديد في متجرك!*\n\n• المنتج: *${order.product||''}*\n• اللون: ${order.color||''}\n${order.size?'• المقاس: '+order.size+'\n':''}• السعر: *${order.price} KWD*\n• التاريخ: ${order.date||''}\n\nافتح لوحة الأدمن لتأكيد الطلب 👆`;
  window.open(`https://wa.me/${mkt.waNumber}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ===== MODAL =====
function openModal(){document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});

// ===== IMAGE HELPERS =====
function loadImg(inp,urlId,prevId,circle){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{document.getElementById(urlId).value=e.target.result;previewImg(e.target.result,prevId,circle);};r.readAsDataURL(f);
}
function previewImg(url,prevId,circle){
  const el=document.getElementById(prevId);if(!el)return;
  el.innerHTML=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`:(circle?'👤':'🖼️');
}

// ===== LIGHTBOX =====
let lbUrls=[],lbIdx=0;
function openLightbox(urls,idx){
  lbUrls=Array.isArray(urls)?urls:Object.values(urls||{});
  lbIdx=idx||0;
  document.getElementById('lbBg').classList.add('open');
  _lbRender();
  document.addEventListener('keydown',_lbKey);
}
function closeLightbox(){
  document.getElementById('lbBg').classList.remove('open');
  document.removeEventListener('keydown',_lbKey);
}
function _lbRender(){
  document.getElementById('lbImg').src=lbUrls[lbIdx];
  const c=document.getElementById('lbCounter');
  c.textContent=lbUrls.length>1?(lbIdx+1)+' / '+lbUrls.length:'';
  document.getElementById('lbPrev').style.display=lbUrls.length>1?'flex':'none';
  document.getElementById('lbNext').style.display=lbUrls.length>1?'flex':'none';
}
function lbMove(dir){lbIdx=(lbIdx+dir+lbUrls.length)%lbUrls.length;_lbRender();}
function _lbKey(e){
  if(e.key==='ArrowRight')lbMove(1);
  else if(e.key==='ArrowLeft')lbMove(-1);
  else if(e.key==='Escape')closeLightbox();
}
document.getElementById('lbBg').addEventListener('click',e=>{if(e.target===document.getElementById('lbBg'))closeLightbox();});

// ===== LEADERBOARD =====
function renderLeaderboard(){
  const ma=marketersArr().filter(m=>m.status==='active');
  if(!ma.length)return`<div class="section"><div class="empty">لا يوجد مسوقون نشطون بعد</div></div>`;
  const rows=ma.map(m=>{
    const myRefs=Object.values(registrationsData).filter(r=>r.ref===m.slug);
    const myOrders=Object.values(orders||{}).filter(o=>o.marketer===m.name||o.marketer_id===m.id||o.marketer_slug===m.slug);
    const delivered=myOrders.filter(o=>o.status==='delivered');
    const revenue=delivered.reduce((s,o)=>s+(parseFloat(o.total)||0),0);
    const earnings=parseFloat(m.earnings||0);
    return{...m,myRefs,approved:myRefs.filter(r=>r.status==='approved').length,revenue,earnings,ordersCount:myOrders.length,deliveredCount:delivered.length};
  }).sort((a,b)=>b.earnings-a.earnings);
  const medals=['🥇','🥈','🥉'];
  return`<div class="section">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:var(--gold)">${rows.length}</div>
        <div style="font-size:11px;color:var(--mt)">مسوق نشط</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:var(--green)">${rows.reduce((s,r)=>s+r.deliveredCount,0)}</div>
        <div style="font-size:11px;color:var(--mt)">طلب مسلّم</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:var(--blue)">${Object.values(registrationsData).filter(r=>r.status==='approved').length}</div>
        <div style="font-size:11px;color:var(--mt)">إحالة مفعّلة</div>
      </div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:800;color:var(--gold)">🏆 ترتيب المسوقين</div>
      <table class="tbl" style="margin:0">
        <tr><th style="width:36px">#</th><th>المسوق</th><th>الطلبات</th><th>المبيعات</th><th>الإحالات</th><th>الأرباح</th></tr>
        ${rows.map((m,i)=>{
          const isTop=i===0;
          return`<tr style="${isTop?'background:rgba(201,169,110,.06);':''}">
            <td style="font-size:18px;text-align:center">${medals[i]||`<span style="color:var(--mt);font-size:12px">${i+1}</span>`}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                ${m.logo?`<img src="${xe(m.logo)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bd)">`
                  :`<div style="width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold)">${xe((m.name||'م')[0])}</div>`}
                <div>
                  <div style="font-size:13px;font-weight:800;color:${isTop?'var(--gold)':'var(--tx)'}">${xe(m.name)}</div>
                  <div style="font-size:10px;color:var(--mt)">${xe(m.slug)}.dibajat.store</div>
                </div>
              </div>
            </td>
            <td><div style="font-size:13px;font-weight:800">${m.deliveredCount} <span style="font-size:10px;color:var(--mt);font-weight:400">مسلّم</span></div><div style="font-size:10px;color:var(--mt)">${m.ordersCount} إجمالي</div></td>
            <td><span style="font-weight:800;color:var(--tx)">${m.revenue.toFixed(1)} KWD</span></td>
            <td><div style="font-size:13px;font-weight:800">${m.myRefs.length} <span style="font-size:10px;color:var(--mt);font-weight:400">إجمالي</span></div>${m.approved?`<div style="font-size:10px;color:var(--green)">✅ ${m.approved} مفعّل</div>`:''}</td>
            <td><span style="font-size:14px;font-weight:900;color:var(--green)">${m.earnings} KWD</span></td>
          </tr>`;
        }).join('')}
      </table>
    </div>
  </div>`;
}

document.getElementById('content').innerHTML='<div class="empty" style="padding:60px;font-size:14px">⏳ جاري التحقق من الهوية...</div>';
