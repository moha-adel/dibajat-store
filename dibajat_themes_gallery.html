
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}
.root{padding:24px 16px 32px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.top-label{font-size:22px;font-weight:500;color:var(--color-text-primary);text-align:center;}
.sub-label{font-size:14px;color:var(--color-text-secondary);text-align:center;margin-top:4px;}
.name-box{display:flex;align-items:center;justify-content:space-between;gap:12px;width:300px;background:var(--color-background-primary);border:1.5px solid var(--color-border-secondary);border-radius:12px;padding:10px 16px;}
.name-text{font-size:17px;font-weight:500;color:var(--color-text-primary);}
.copy-btn{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s;}
.copy-btn:hover{color:var(--color-text-primary);border-color:var(--color-border-primary);}
.copy-btn.ok{color:#0F6E56;border-color:#5DCAA5;background:#E1F5EE;}
.phone-wrap{position:relative;width:280px;}
.phone-shell{width:280px;height:560px;border-radius:36px;border:4px solid #555;background:#222;overflow:hidden;position:relative;}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:64px;height:14px;background:#222;border-radius:10px;z-index:5;}
.theme-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.theme-img.fade{opacity:0;}
.arrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.92);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:#222;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.arrow:active{transform:translateY(-50%) scale(0.93);}
.arrow-left{left:-22px;}
.arrow-right{right:-22px;}
.bottom-row{display:flex;flex-direction:column;align-items:center;gap:10px;}
.counter{font-size:13px;color:var(--color-text-secondary);}
.dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:300px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);cursor:pointer;transition:all .2s;}
.dot.on{background:var(--color-text-primary);transform:scale(1.4);}
</style>

<div class="root">
  <div>
    <div class="top-label">معرض الثيمات</div>
    <div class="sub-label">اختر الثيم المناسب لمتجرك</div>
  </div>

  <div class="name-box">
    <span class="name-text" id="tname">Arctic</span>
    <button class="copy-btn" id="cbtn" onclick="doCopy()">
      <i class="ti ti-copy" aria-hidden="true"></i>
      <span id="clabel">نسخ</span>
    </button>
  </div>

  <div class="phone-wrap">
    <div class="phone-shell">
      <div class="notch"></div>
      <img class="theme-img" id="timg" src="" alt="theme" />
    </div>
    <button class="arrow arrow-left" onclick="go(-1)" aria-label="السابق">
      <i class="ti ti-chevron-right" aria-hidden="true"></i>
    </button>
    <button class="arrow arrow-right" onclick="go(1)" aria-label="التالي">
      <i class="ti ti-chevron-left" aria-hidden="true"></i>
    </button>
  </div>

  <div class="bottom-row">
    <div class="counter" id="cnt">1 / 13</div>
    <div class="dots" id="dots"></div>
  </div>
</div>

];
let c=0;
const img=document.getElementById('timg');
const nm=document.getElementById('tname');
const cnt=document.getElementById('cnt');
const dotsEl=document.getElementById('dots');

function mkDots(){
  dotsEl.innerHTML='';
  T.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===c?' on':'');
    d.onclick=()=>goTo(i);
    dotsEl.appendChild(d);
  });
}

function goTo(idx){
  img.classList.add('fade');
  setTimeout(()=>{
    c=(idx+T.length)%T.length;
    img.src=T[c].u;
    nm.textContent=T[c].n;
    cnt.textContent=(c+1)+' / '+T.length;
    mkDots();
    img.classList.remove('fade');
  },200);
}

function go(dir){goTo(c+dir);}

function doCopy(){
  navigator.clipboard.writeText(T[c].n).then(()=>{
    const b=document.getElementById('cbtn');
    const l=document.getElementById('clabel');
    b.classList.add('ok');
    l.textContent='تم!';
    setTimeout(()=>{b.classList.remove('ok');l.textContent='نسخ';},1800);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(-1);
  if(e.key==='ArrowLeft')go(1);
});

const shell=document.querySelector('.phone-shell');
let tx=0;
shell.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
shell.addEventListener('touchend',e=>{
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>40) go(d>0?1:-1);
});

img.src=T[0].u;
mkDots();
</script>
