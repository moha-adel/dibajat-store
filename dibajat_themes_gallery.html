
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.gallery-wrap { padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
.header { text-align: center; }
.header h2 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.header p { font-size: 14px; color: var(--color-text-secondary); }
.viewer { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; max-width: 420px; }
.phone-frame { position: relative; width: 288px; height: 580px; border-radius: 32px; border: 0.5px solid var(--color-border-secondary); overflow: hidden; background: var(--color-background-secondary); box-shadow: none; }
.phone-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.25s ease; }
.phone-img.fade { opacity: 0; }
.nav-row { display: flex; align-items: center; gap: 1.5rem; }
.nav-btn { width: 44px; height: 44px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background 0.15s; }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn:active { transform: scale(0.95); }
.theme-name-wrap { display: flex; align-items: center; gap: 10px; }
.theme-name { font-size: 18px; font-weight: 500; color: var(--color-text-primary); min-width: 160px; text-align: center; }
.copy-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px 10px; cursor: pointer; transition: all 0.15s; }
.copy-btn:hover { border-color: var(--color-border-secondary); color: var(--color-text-primary); }
.copy-btn.copied { color: var(--color-text-success); border-color: var(--color-border-success); }
.dots { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; max-width: 320px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); cursor: pointer; transition: all 0.2s; }
.dot.active { background: var(--color-text-primary); transform: scale(1.3); }
.counter { font-size: 13px; color: var(--color-text-secondary); }
</style>

<div class="gallery-wrap">
  <div class="header">
    <h2>معرض الثيمات</h2>
    <p>اختر الثيم المناسب لمتجرك</p>
  </div>

  <div class="viewer">
    <div class="theme-name-wrap">
      <button class="copy-btn" id="copyBtn" onclick="copyName()">
        <i class="ti ti-copy" aria-hidden="true"></i>
        <span id="copyLabel">نسخ</span>
      </button>
      <div class="theme-name" id="themeName">Arctic</div>
    </div>

    <div class="phone-frame">
      <img class="phone-img" id="themeImg" src="" alt="theme preview" />
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" aria-label="السابق">
        <i class="ti ti-chevron-left" aria-hidden="true"></i>
      </button>
      <span class="counter" id="counter">1 / 13</span>
      <button class="nav-btn" onclick="next()" aria-label="التالي">
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="dots" id="dots"></div>
  </div>
</div>

];

let current = 0;
const img = document.getElementById('themeImg');
const nameEl = document.getElementById('themeName');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');

function buildDots() {
  dotsEl.innerHTML = '';
  themes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

function goTo(idx) {
  img.classList.add('fade');
  setTimeout(() => {
    current = (idx + themes.length) % themes.length;
    img.src = themes[current].url;
    nameEl.textContent = themes[current].name;
    counterEl.textContent = (current + 1) + ' / ' + themes.length;
    img.classList.remove('fade');
    buildDots();
  }, 200);
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

function copyName() {
  navigator.clipboard.writeText(themes[current].name).then(() => {
    const btn = document.getElementById('copyBtn');
    const label = document.getElementById('copyLabel');
    btn.classList.add('copied');
    label.textContent = 'تم!';
    setTimeout(() => { btn.classList.remove('copied'); label.textContent = 'نسخ'; }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') prev();
  if (e.key === 'ArrowLeft') next();
});

let touchStartX = 0;
document.querySelector('.phone-frame').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.querySelector('.phone-frame').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) diff > 0 ? next() : prev();
});

img.src = themes[0].url;
buildDots();
</script>
