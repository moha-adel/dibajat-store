

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Tajawal,Arial,sans-serif;
background:linear-gradient(135deg,#f8fafc,#eef2ff);
padding:30px 15px;
}
.root{
max-width:1200px;
margin:auto;
display:flex;
flex-direction:column;
align-items:center;
gap:24px;
}
.top-label{
font-size:36px;
font-weight:800;
color:#111827;
}
.sub-label{
font-size:16px;
color:#6b7280;
margin-top:8px;
}
.name-box{
width:min(700px,100%);
background:#fff;
border:none;
border-radius:20px;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.name-text{
font-size:24px;
font-weight:700;
color:#111827;
}
.copy-btn{
border:none;
border-radius:12px;
padding:10px 18px;
background:#4f46e5;
color:#fff;
cursor:pointer;
}
.phone-wrap{position:relative}
.phone-shell{
width:360px;
height:720px;
border-radius:40px;
background:#111827;
padding:10px;
box-shadow:0 25px 60px rgba(0,0,0,.25);
overflow:hidden;
}
.notch{
position:absolute;
top:18px;
left:50%;
transform:translateX(-50%);
width:120px;
height:24px;
background:#111827;
border-radius:20px;
z-index:10;
}
.theme-img{
width:100%;
height:100%;
object-fit:cover;
border-radius:30px;
}
.arrow{font-size:28px;font-weight:700;line-height:1;
position:absolute;
top:50%;
transform:translateY(-50%);
width:56px;
height:56px;
border:none;
border-radius:50%;
background:#fff;
font-size:24px;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}
.arrow-left{left:-28px}
.arrow-right{right:-28px}
.bottom-row{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.counter{
font-size:15px;
font-weight:700;
margin-bottom:10px;
text-align:center;
}
.dots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.dot{
width:10px;height:10px;border-radius:50%;
background:#cbd5e1;
cursor:pointer;
}
.dot.on{
background:#4f46e5;
transform:scale(1.4);
}
</style>


<div class="root">
  <div>
    <div class="top-label">معرض الثيمات</div>
    <div class="sub-label">اختر الثيم المناسب لمتجرك</div>
  </div>

  <div class="name-box">
    <span class="name-text" id="tname">Arctic</span>
    <button class="copy-btn" id="cbtn" onclick="doCopy()">
      <i class="ti ti-copy" aria-hidden="true"></i>
      <span id="clabel">نسخ</span>
    </button>
  </div>

  <div class="phone-wrap">
    <div class="phone-shell">
      <div class="notch"></div>
      <img class="theme-img" id="timg" src="" alt="theme" />
    </div>
    <button class="arrow arrow-left" onclick="go(-1)" aria-label="السابق">&#10095;</button>
    <button class="arrow arrow-right" onclick="go(1)" aria-label="التالي">&#10094;</button>
  </div>

  <div class="bottom-row">
    <div class="counter" id="cnt">1 / 13</div>
    <div class="dots" id="dots"></div>
  </div>
</div>

];
let c=0;
const img=document.getElementById('timg');
const nm=document.getElementById('tname');
const cnt=document.getElementById('cnt');
const dotsEl=document.getElementById('dots');

function mkDots(){
  dotsEl.innerHTML='';
  T.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===c?' on':'');
    d.onclick=()=>goTo(i);
    dotsEl.appendChild(d);
  });
}

function goTo(idx){
  img.classList.add('fade');
  setTimeout(()=>{
    c=(idx+T.length)%T.length;
    img.src=T[c].u;
    nm.textContent=T[c].n;
    cnt.textContent=(c+1)+' / '+T.length;
    mkDots();
    img.classList.remove('fade');
  },200);
}

function go(dir){goTo(c+dir);}

function doCopy(){
  navigator.clipboard.writeText(T[c].n).then(()=>{
    const b=document.getElementById('cbtn');
    const l=document.getElementById('clabel');
    b.classList.add('ok');
    l.textContent='تم!';
    setTimeout(()=>{b.classList.remove('ok');l.textContent='نسخ';},1800);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(-1);
  if(e.key==='ArrowLeft')go(1);
});

const shell=document.querySelector('.phone-shell');
let tx=0;
shell.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
shell.addEventListener('touchend',e=>{
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>40) go(d>0?1:-1);
});

img.src=T[0].u;
mkDots();
</script>
