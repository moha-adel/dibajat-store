
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; font-family: var(--font-sans); }
.title-area { text-align: center; }
.title-area h2 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.title-area p { font-size: 14px; color: var(--color-text-secondary); }
.name-box { display: flex; align-items: center; gap: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 10px 18px; min-width: 260px; justify-content: space-between; }
.name-text { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
.copy-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.copy-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
.copy-btn.copied { color: #0F6E56; border-color: #5DCAA5; background: #E1F5EE; }
.slider-row { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 420px; justify-content: center; }
.nav-btn { flex-shrink: 0; width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; transition: background 0.15s, border-color 0.15s; }
.nav-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.nav-btn:active { transform: scale(0.94); }
.phone-frame { position: relative; width: 240px; height: 520px; border-radius: 36px; border: 3px solid #888780; overflow: hidden; background: #2C2C2A; flex-shrink: 0; }
.phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 60px; height: 12px; background: #2C2C2A; border-radius: 10px; z-index: 10; }
.phone-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.22s ease; }
.phone-img.fade { opacity: 0; }
.dots { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; max-width: 320px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); cursor: pointer; transition: all 0.2s; }
.dot.active { background: var(--color-text-primary); transform: scale(1.35); }
.counter { font-size: 13px; color: var(--color-text-secondary); }
</style>

<div class="wrap">
  <div class="title-area">
    <h2>معرض الثيمات</h2>
    <p>اختر الثيم المناسب لمتجرك</p>
  </div>

  <div class="name-box">
    <span class="name-text" id="themeName">Arctic</span>
    <button class="copy-btn" id="copyBtn" onclick="copyName()">
      <i class="ti ti-copy" aria-hidden="true"></i>
      <span id="copyLabel">نسخ الاسم</span>
    </button>
  </div>

  <div class="slider-row">
    <button class="nav-btn" onclick="prev()" aria-label="السابق">
      <i class="ti ti-chevron-right" aria-hidden="true"></i>
    </button>

    <div class="phone-frame">
      <div class="phone-notch"></div>
      <img class="phone-img" id="themeImg" src="" alt="theme preview" />
    </div>

    <button class="nav-btn" onclick="next()" aria-label="التالي">
      <i class="ti ti-chevron-left" aria-hidden="true"></i>
    </button>
  </div>

  <span class="counter" id="counter">1 / 13</span>
  <div class="dots" id="dots"></div>
</div>

];

let current = 0;
const img = document.getElementById('themeImg');
const nameEl = document.getElementById('themeName');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');

function buildDots() {
  dotsEl.innerHTML = '';
  themes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

function goTo(idx) {
  img.classList.add('fade');
  setTimeout(() => {
    current = (idx + themes.length) % themes.length;
    img.src = themes[current].url;
    nameEl.textContent = themes[current].name;
    counterEl.textContent = (current + 1) + ' / ' + themes.length;
    buildDots();
    img.classList.remove('fade');
  }, 200);
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

function copyName() {
  navigator.clipboard.writeText(themes[current].name).then(() => {
    const btn = document.getElementById('copyBtn');
    const label = document.getElementById('copyLabel');
    btn.classList.add('copied');
    label.textContent = '✓ تم النسخ';
    setTimeout(() => { btn.classList.remove('copied'); label.textContent = 'نسخ الاسم'; }, 1800);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') prev();
  if (e.key === 'ArrowLeft') next();
});

const frame = document.querySelector('.phone-frame');
let tx = 0;
frame.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
frame.addEventListener('touchend', e => {
  const diff = tx - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) diff > 0 ? next() : prev();
});

img.src = themes[0].url;
buildDots();
</script>
